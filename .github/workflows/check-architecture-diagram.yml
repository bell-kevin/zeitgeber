name: Check Architecture Diagram

on:
  pull_request:

permissions:
  contents: read

jobs:
  check-diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify architecture diagram is current
        run: python scripts/generate_architecture_diagram.py --check
